<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChessPro</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{
  --bg:#0a0a12;--surf:#13131f;--surf2:#1c1c2e;--surf3:#23233a;
  --bdr:#2a2a40;--bdr2:#36365a;
  --gold:#c9a84c;--gold2:#e8c97a;--glow:rgba(201,168,76,.16);
  --acc:#5b6af0;--grn:#27ae60;--red:#e74c3c;--org:#f39c12;
  --txt:#e2e2f0;--txt2:#9090b0;--mut:#55556a;
  --sql:#f0d9b5;--sqd:#b58863;--sh:rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f0f0f8;--surf:#fff;--surf2:#f4f4fc;--surf3:#eaeaf2;
  --bdr:#d0d0e8;--bdr2:#c0c0d8;
  --gold:#906000;--gold2:#b07a00;--glow:rgba(144,96,0,.12);
  --acc:#4050c8;--grn:#1a7a40;--red:#b02a20;--org:#a06000;
  --txt:#18182a;--txt2:#505070;--mut:#808098;--sh:rgba(0,0,0,.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--txt);min-height:100vh;overflow:hidden;}
button{cursor:pointer;font-family:inherit;transition:all .2s;}
input,select{font-family:inherit;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}

/* SCREENS */
.sc{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transform:translateY(14px);transition:opacity .3s,transform .3s;overflow-y:auto;padding:16px;z-index:1;}
.sc.on{opacity:1;pointer-events:all;transform:translateY(0);}

/* LOGIN */
#sLogin{background:var(--bg);}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.lcard{position:relative;z-index:1;background:var(--surf);border:1px solid var(--bdr);border-radius:22px;padding:36px 38px;width:100%;max-width:390px;box-shadow:0 20px 70px var(--sh),0 0 50px var(--glow);}
.llogo{text-align:center;margin-bottom:28px;}
.llogo-icon{font-size:3.5rem;display:block;filter:drop-shadow(0 0 16px var(--gold));}
.llogo-h1{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:5px;margin-top:8px;}
.llogo-sub{color:var(--mut);font-size:.74rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.atabs{display:flex;background:var(--surf2);border-radius:10px;padding:3px;margin-bottom:22px;}
.atab{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:var(--mut);font-size:.84rem;font-weight:600;}
.atab.on{background:var(--surf);color:var(--txt);box-shadow:0 2px 8px var(--sh);}
.fg{margin-bottom:14px;}
.fl{font-size:.74rem;font-weight:700;color:var(--txt2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.iw{position:relative;}
.iw .ii{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:.9rem;pointer-events:none;}
.fi{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 11px 10px 36px;color:var(--txt);font-size:.9rem;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--gold);}
.fi.noico{padding-left:11px;}
.fi.bad{border-color:var(--red);}
.fe{font-size:.72rem;color:var(--red);margin-top:4px;display:none;}
.fe.on{display:block;}
.btn-auth{width:100%;padding:12px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;font-weight:700;font-size:.9rem;letter-spacing:.5px;margin-top:4px;}
.btn-auth:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--glow);}
.btn-auth:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.hint-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:9px 12px;text-align:center;font-size:.74rem;color:var(--mut);margin-top:14px;}
.hint-box strong{color:var(--gold);}

/* HOME */
#sHome{padding:0;overflow:hidden;}
.hlayout{display:flex;width:100%;height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;padding:16px 9px;overflow-y:auto;}
.sblogo{display:flex;align-items:center;gap:8px;padding:5px 10px;margin-bottom:16px;}
.sblogo-i{font-size:1.6rem;}
.sblogo-t{font-family:'Cinzel',serif;font-size:.95rem;font-weight:900;color:var(--gold);letter-spacing:2px;}
.nsec{margin-bottom:14px;}
.nsec-t{font-size:.6rem;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;padding:0 10px;margin-bottom:5px;}
.nb{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;color:var(--txt2);font-size:.83rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .18s;}
.nb:hover{background:var(--surf2);color:var(--txt);}
.nb.on{background:rgba(201,168,76,.1);color:var(--gold);}
.ni{font-size:1rem;width:18px;text-align:center;flex-shrink:0;}
.sbprf{margin-top:auto;padding:10px;background:var(--surf2);border-radius:10px;border:1px solid var(--bdr);cursor:pointer;transition:border-color .18s;}
.sbprf:hover{border-color:var(--gold);}
.sbprf-r{display:flex;align-items:center;gap:8px;}
.sbav{font-size:1.45rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--surf3);border-radius:7px;flex-shrink:0;}
.sbn{font-weight:600;font-size:.83rem;}
.sbe{font-size:.68rem;color:var(--gold);}
.sbr{font-size:.63rem;color:var(--mut);}
.hmain{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.ptitle{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold);}
.psub{color:var(--txt2);font-size:.8rem;margin-top:2px;}

/* COMMON */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.sbox{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:12px;text-align:center;}
.sval{font-family:'Cinzel',serif;font-size:1.45rem;font-weight:700;color:var(--gold);}
.slbl{font-size:.68rem;color:var(--mut);margin-top:2px;}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:9px;}
.acard{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;text-align:left;}
.acard:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 7px 20px var(--sh);}
.aci{font-size:1.7rem;margin-bottom:7px;}
.act{font-weight:600;font-size:.85rem;}
.acd{font-size:.7rem;color:var(--mut);margin-top:2px;}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:18px;}
.ctitle{font-weight:700;font-size:.82rem;color:var(--gold);margin-bottom:11px;display:flex;align-items:center;gap:5px;}
.panel{background:var(--surf);border:1px solid var(--bdr);border-radius:17px;padding:20px;width:100%;max-width:490px;box-shadow:0 12px 40px var(--sh);}
.panel.lg{max-width:680px;}
.btn{padding:8px 17px;border-radius:8px;font-size:.83rem;font-weight:600;border:none;cursor:pointer;transition:all .18s;}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;}
.bp:hover{transform:translateY(-1px);box-shadow:0 5px 16px var(--glow);}
.bs{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);}
.bs:hover{border-color:var(--gold);color:var(--gold);}
.bd{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.22);}
.bd:hover{background:var(--red);color:#fff;}
.bg{background:transparent;color:var(--mut);border:1px solid var(--bdr);}
.bg:hover{color:var(--txt);}
.bsm{padding:5px 11px;font-size:.76rem;border-radius:7px;}
.bxs{padding:3px 8px;font-size:.69rem;border-radius:6px;}
.bfull{width:100%;}
.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);}
.sr:last-child{border-bottom:none;}
.sn{font-size:.85rem;font-weight:500;}
.sd{font-size:.72rem;color:var(--mut);margin-top:2px;}
.tgl{position:relative;width:40px;height:22px;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;}
.ts{position:absolute;inset:0;background:var(--bdr);border-radius:22px;cursor:pointer;transition:.25s;}
.ts::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;}
.tgl input:checked+.ts{background:var(--grn);}
.tgl input:checked+.ts::before{transform:translateX(18px);}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:4px 10px;border-radius:16px;font-size:.71rem;font-weight:600;border:1px solid var(--bdr);background:var(--surf2);color:var(--mut);cursor:pointer;transition:all .18s;}
.chip.on{border-color:var(--acc);color:var(--acc);background:rgba(91,106,240,.08);}
.dtbl{width:100%;border-collapse:collapse;font-size:.76rem;}
.dtbl th{text-align:left;padding:6px 9px;color:var(--mut);font-weight:700;border-bottom:1px solid var(--bdr);font-size:.68rem;text-transform:uppercase;}
.dtbl td{padding:6px 9px;border-bottom:1px solid var(--bdr);}
.dtbl tr:last-child td{border-bottom:none;}
.dtbl tr:hover td{background:rgba(255,255,255,.015);}
.bdg{font-size:.63rem;padding:2px 7px;border-radius:10px;font-weight:700;display:inline-block;}
.bdg.admin{background:rgba(201,168,76,.15);color:var(--gold);}
.bdg.user{background:rgba(85,85,106,.15);color:var(--mut);}
.avg{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0;}
.avo{font-size:1.5rem;width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:9px;border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;transition:all .18s;}
.avo:hover{border-color:var(--gold);}
.avo.on{border-color:var(--gold);background:rgba(201,168,76,.08);}

/* GITHUB STATUS badge */
.gh-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-size:.72rem;font-weight:600;border:1px solid var(--bdr);background:var(--surf2);}
.gh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.gh-dot.ok{background:var(--grn);box-shadow:0 0 4px var(--grn);}
.gh-dot.ko{background:var(--red);}
.gh-dot.ld{background:var(--org);animation:blink 1s infinite;}
.gh-dot.off{background:var(--mut);}

/* GAME */
#sGame{padding:0;overflow:hidden;}
.gwrap{display:flex;width:100%;height:100vh;}
.gleft{display:flex;flex-direction:column;padding:9px;gap:6px;flex-shrink:0;}
.gright{width:230px;flex-shrink:0;display:flex;flex-direction:column;padding:9px;gap:6px;overflow:hidden;}
.pstrip{background:var(--surf);border:1.5px solid var(--bdr);border-radius:10px;padding:8px 11px;display:flex;align-items:center;gap:8px;transition:border-color .25s;}
.pstrip.act{border-color:var(--gold);}
.pav{font-size:1.25rem;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--surf2);border-radius:6px;flex-shrink:0;}
.pname{font-weight:600;font-size:.8rem;}
.pelo{font-size:.66rem;color:var(--gold);}
.pcap{font-size:.72rem;min-height:15px;}
.ptimer{margin-left:auto;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;background:var(--surf2);border:1px solid var(--bdr);padding:3px 8px;border-radius:6px;min-width:56px;text-align:center;}
.ptimer.low{color:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.bwrap{display:flex;align-items:center;justify-content:center;flex:1;padding:9px;}
.binner{display:flex;flex-direction:column;align-items:center;}
.crow{display:flex;}
.rcol{display:flex;flex-direction:column;justify-content:space-around;padding-right:4px;}
.rcol span,.frow span{font-family:'Cinzel',serif;font-size:.6rem;color:var(--mut);}
.rcol span{height:calc(var(--bs,480px)/8);display:flex;align-items:center;}
.frow{display:flex;justify-content:space-around;padding-top:4px;padding-left:18px;}
.frow span{width:calc(var(--bs,480px)/8);text-align:center;}
#board{display:grid;grid-template-columns:repeat(8,calc(var(--bs,480px)/8));grid-template-rows:repeat(8,calc(var(--bs,480px)/8));border:2px solid var(--gold);box-shadow:0 0 35px rgba(201,168,76,.1),0 12px 38px var(--sh);width:var(--bs,480px);height:var(--bs,480px);}
.sq{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none;transition:filter .1s;}
.sq.l{background:var(--sql);}
.sq.d{background:var(--sqd);}
.sq.ssel{background:var(--grn)!important;}
.sq.smov{background:var(--acc)!important;}
.sq.scap{background:var(--red)!important;}
.sq.slast{box-shadow:inset 0 0 0 3px rgba(255,220,60,.4);}
.sq.schk{box-shadow:inset 0 0 0 3px rgba(255,50,50,.7)!important;}
.sq.smov::after{content:'';position:absolute;width:28%;height:28%;border-radius:50%;background:rgba(255,255,255,.2);pointer-events:none;}
.sq:hover{filter:brightness(1.12);}
.piece{font-size:calc(var(--bs,480px)/8*.68);line-height:1;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.45));pointer-events:none;}
.mpanel{flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.mhdr{padding:8px 11px;border-bottom:1px solid var(--bdr);font-size:.69rem;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:1px;}
.mbody{flex:1;overflow-y:auto;padding:6px;}
.mrow{display:flex;gap:3px;margin-bottom:2px;align-items:center;}
.mnum{color:var(--mut);font-size:.7rem;width:19px;flex-shrink:0;text-align:right;}
.mbtn{flex:1;text-align:left;padding:2px 5px;border-radius:4px;font-size:.72rem;border:none;background:transparent;color:var(--txt);cursor:pointer;transition:background .12s;}
.mbtn:hover{background:var(--surf2);}
.mbtn.cur{background:var(--acc);color:#fff;}
.cpanel{height:170px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.cmsgs{flex:1;overflow-y:auto;padding:6px;font-size:.73rem;}
.cmsg{margin-bottom:3px;line-height:1.4;}
.cfrom{font-weight:600;color:var(--gold);}
.csys{color:var(--mut);font-style:italic;}
.crow2{display:flex;gap:5px;padding:6px;border-top:1px solid var(--bdr);}
.cinput{flex:1;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;padding:5px 8px;color:var(--txt);font-size:.73rem;outline:none;}
.cinput:focus{border-color:var(--gold);}
.gact{display:flex;gap:5px;flex-shrink:0;}
.gact button{flex:1;padding:6px 3px;border-radius:8px;font-size:.7rem;font-weight:600;border:1px solid var(--bdr);background:var(--surf);color:var(--txt2);cursor:pointer;transition:all .18s;}
.gact button:hover{border-color:var(--txt);color:var(--txt);}
.gact .resign:hover{border-color:var(--red);color:var(--red);}
.ardbar{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:.7rem;flex-shrink:0;}
.adot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex-shrink:0;transition:all .3s;}
.adot.on{background:var(--grn);box-shadow:0 0 5px var(--grn);}

/* ONLINE */
.otabs{display:flex;background:var(--surf2);border-radius:9px;padding:3px;margin-bottom:14px;}
.otab{flex:1;padding:7px;border-radius:7px;border:none;background:transparent;color:var(--mut);font-size:.79rem;font-weight:600;cursor:pointer;transition:all .18s;}
.otab.on{background:var(--surf);color:var(--txt);box-shadow:0 1px 5px var(--sh);}
.opane{display:none;}
.opane.on{display:block;}
.rdisp{background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:17px;text-align:center;margin:11px 0;}
.rcode{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;color:var(--gold);letter-spacing:7px;}
.cbar{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:9px;background:var(--surf2);border:1px solid var(--bdr);margin-top:8px;font-size:.78rem;}
.cd{width:8px;height:8px;border-radius:50%;background:var(--mut);flex-shrink:0;transition:all .3s;}
.cd.connecting{background:var(--org);animation:blink 1s infinite;}
.cd.connected{background:var(--grn);}
.cd.error{background:var(--red);}
.spinner{width:40px;height:40px;border:3px solid var(--bdr);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* LEADERBOARD */
.lbtbl{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;}
.lbrow{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--bdr);transition:background .12s;}
.lbrow:last-child{border-bottom:none;}
.lbrow:hover{background:var(--surf2);}
.lbav{font-size:1.15rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--surf2);border-radius:6px;}
.lbname{flex:1;font-weight:600;font-size:.83rem;}
.lbelo{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:var(--gold);min-width:52px;text-align:right;}
.lbwl{font-size:.7rem;color:var(--mut);min-width:58px;text-align:right;}

/* HISTORY */
.hlist{display:flex;flex-direction:column;gap:7px;}
.hcard{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.hbadge{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;flex-shrink:0;}
.hbadge.win{background:rgba(39,174,96,.15);color:var(--grn);}
.hbadge.lose{background:rgba(231,76,60,.15);color:var(--red);}
.hbadge.draw{background:rgba(85,85,106,.15);color:var(--mut);}
.hinfo{flex:1;}
.htitle{font-weight:600;font-size:.8rem;}
.hmeta{font-size:.68rem;color:var(--mut);margin-top:2px;}
.helo{font-size:.68rem;margin-top:2px;}
.elo-g{color:var(--grn);}
.elo-l{color:var(--red);}

/* REPLAY */
#sReplay{overflow:auto;}
.rpwrap{display:flex;gap:14px;align-items:center;justify-content:center;padding:14px;width:100%;max-width:840px;flex-wrap:wrap;}
.rpctrl{display:flex;gap:6px;justify-content:center;margin-top:8px;align-items:center;}
.rpbtn{background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:.9rem;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;}
.rpbtn:hover{border-color:var(--gold);color:var(--gold);}
.rpctr{font-family:'Cinzel',serif;font-size:.77rem;color:var(--mut);padding:0 8px;min-width:44px;text-align:center;}
#rpboard{display:grid;grid-template-columns:repeat(8,50px);grid-template-rows:repeat(8,50px);border:2px solid var(--gold);}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(5px);}
#modal.on{display:flex;}
.mbox{background:var(--surf);border:2px solid var(--gold);border-radius:20px;padding:28px 40px;text-align:center;box-shadow:0 0 50px var(--glow);animation:popin .22s ease;max-width:340px;width:90%;}
@keyframes popin{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}
.micon{font-size:2.5rem;margin-bottom:8px;}
.mtitle{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--gold);margin-bottom:7px;}
.mbod{color:var(--txt2);font-size:.83rem;margin-bottom:18px;line-height:1.6;}
.melo{font-size:1.1rem;font-weight:700;margin-bottom:12px;}
.mbtns{display:flex;gap:8px;justify-content:center;}

/* TOAST */
#toasts{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;}
.toast{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:7px 15px;font-size:.78rem;box-shadow:0 4px 14px var(--sh);animation:tin .2s ease;}
@keyframes tin{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* INFO BOX */
.info-box{background:rgba(91,106,240,.06);border:1px solid rgba(91,106,240,.2);border-radius:10px;padding:11px 13px;font-size:.78rem;color:var(--txt2);line-height:1.7;margin-bottom:13px;}
.info-box .ib-title{font-weight:700;color:var(--acc);margin-bottom:4px;}
.warn-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:11px 13px;font-size:.78rem;color:var(--txt2);line-height:1.7;margin-bottom:13px;}
.warn-box .wb-title{font-weight:700;color:var(--gold);margin-bottom:4px;}

@media(max-width:800px){.sidebar{display:none;}.sgrid{grid-template-columns:1fr 1fr;}.gright{width:190px;}}
@media(max-width:600px){.gwrap{flex-direction:column;overflow-y:auto;}.gright{width:100%;flex:none;}.gleft{flex:none;}}

<script>
/* ══════════════════════════════════════
   CONSTANTS
══════════════════════════════════════ */
var FILES='abcdefgh';
var SYM={wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};
var AVATARS=['♟','♞','♝','♜','♛','♚','🦁','🐉','⚡','🔥','🌟','🎯','🦊','🐺','🦅'];
var PVAL={P:100,N:320,B:330,R:500,Q:900,K:20000};
var REASONS={checkmate:'Échec et mat',stalemate:'Pat',resign:'Abandon',timeout:'Temps',draw:'Nulle'};

/* ══════════════════════════════════════
   CRYPTO
══════════════════════════════════════ */
async function sha256(str){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str+'__cp__'));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

/* ══════════════════════════════════════
   LOCAL STORAGE
══════════════════════════════════════ */
var LS={
  get:function(k,d){try{var v=localStorage.getItem('cp_'+k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set:function(k,v){try{localStorage.setItem('cp_'+k,JSON.stringify(v));}catch(e){}},
  del:function(k){localStorage.removeItem('cp_'+k);}
};

/* ══════════════════════════════════════
   GITHUB DB
  ── Lecture via raw.githubusercontent (public, pas besoin de token)
  ── Écriture via API avec token (stocké localement)
══════════════════════════════════════ */
var GH={owner:'',repo:'',token:'',branch:'main',ok:false,shas:{}};

function ghLoad(){
  var cfg=LS.get('ghcfg',null);
  if(cfg&&cfg.owner&&cfg.repo&&cfg.token){GH.owner=cfg.owner;GH.repo=cfg.repo;GH.token=cfg.token;GH.branch=cfg.branch||'main';GH.ok=true;return true;}
  return false;
}

async function ghRead(file){
  // On lit via raw.githubusercontent — pas besoin de token, fonctionne toujours
  var url='https://raw.githubusercontent.com/'+GH.owner+'/'+GH.repo+'/'+GH.branch+'/db/'+file+'?t='+Date.now();
  var r=await fetch(url,{cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status+' sur '+file);
  return await r.json();
}

async function ghGetSha(file){
  if(!GH.token) return;
  var url='https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/db/'+file;
  var r=await fetch(url,{headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json'}});
  if(r.ok){var d=await r.json();GH.shas[file]=d.sha;}
}

async function ghWrite(file,data){
  if(!GH.token) throw new Error('Token GitHub manquant');
  // Refresh SHA before writing
  await ghGetSha(file);
  var url='https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/db/'+file;
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  var body={message:'update '+file,content:content,branch:GH.branch};
  if(GH.shas[file]) body.sha=GH.shas[file];
  var r=await fetch(url,{method:'PUT',headers:{'Authorization':'token '+GH.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
  if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error(e.message||'HTTP '+r.status);}
  var res=await r.json();
  GH.shas[file]=res.content.sha;
}

async function ghTestConnection(){
  var url='https://api.github.com/repos/'+GH.owner+'/'+GH.repo;
  var r=await fetch(url,{headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json'}});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return await r.json();
}

/* ══════════════════════════════════════
   DATA LAYER
  ── Toujours en localStorage (source principale)
  ── GitHub = sync optionnel quand configuré
══════════════════════════════════════ */
var USERS={};
var GAMES=[];

async function dataInit(){
  // Charger depuis localStorage d'abord
  USERS=LS.get('users',{});
  GAMES=LS.get('games',[]);

  // Créer admin par défaut si absent
  if(!USERS['admin']){
    var h=await sha256('admin');
    USERS['admin']={id:'admin',pseudo:'admin',password:h,avatar:'♚',role:'admin',elo:1500,games:0,wins:0,losses:0,draws:0,joined:new Date().toLocaleDateString('fr-FR')};
    LS.set('users',USERS);
  }

  // Si GitHub configuré, essayer de synchroniser
  if(GH.ok){
    try{
      var remoteUsers=await ghRead('users.json');
      var remoteGames=await ghRead('games.json');
      // Merger : garder le plus récent (GitHub = source de vérité si disponible)
      USERS=remoteUsers;
      GAMES=remoteGames;
      LS.set('users',USERS);
      LS.set('games',GAMES);
    }catch(e){
      // GitHub inaccessible → on reste avec localStorage, pas grave
      console.log('GitHub sync failed, using local data:', e.message);
    }
  }
}

async function saveUsers(){
  LS.set('users',USERS);
  if(GH.ok){
    try{await ghWrite('users.json',USERS);}
    catch(e){console.log('GitHub write failed:',e.message);}
  }
}

async function saveGames(){
  LS.set('games',GAMES);
  if(GH.ok){
    try{await ghWrite('games.json',GAMES);}
    catch(e){console.log('GitHub write failed:',e.message);}
  }
}

function ghStatus(){
  if(!GH.ok) return {cls:'off',txt:'Stockage local uniquement'};
  return {cls:'ok',txt:GH.owner+'/'+GH.repo};
}

/* ══════════════════════════════════════
   AUTH
══════════════════════════════════════ */
var ME=null;

async function doLogin(){
  var pseudo=document.getElementById('lPseudo').value.trim();
  var pass=document.getElementById('lPass').value;
  var errEl=document.getElementById('lErr');
  errEl.className='fe';
  if(!pseudo||!pass){errEl.textContent='Remplissez tous les champs.';errEl.className='fe on';return;}
  var found=null;
  var keys=Object.keys(USERS);
  for(var i=0;i<keys.length;i++){if(USERS[keys[i]].pseudo.toLowerCase()===pseudo.toLowerCase()){found=USERS[keys[i]];break;}}
  if(!found){errEl.textContent='Pseudo introuvable.';errEl.className='fe on';return;}
  var hash=await sha256(pass);
  if(hash!==found.password){errEl.textContent='Mot de passe incorrect.';errEl.className='fe on';return;}
  ME=found;
  LS.set('sess',{id:found.id,ts:Date.now()});
  enterHome();
}

async function doRegister(){
  var pseudo=document.getElementById('rPseudo').value.trim();
  var pass=document.getElementById('rPass').value;
  var pass2=document.getElementById('rPass2').value;
  var e1=document.getElementById('rPseudoErr'),e2=document.getElementById('rPassErr'),e3=document.getElementById('rPass2Err');
  e1.className=e2.className=e3.className='fe';
  var ok=true;
  if(!pseudo||pseudo.length<3){e1.textContent='Pseudo trop court (min. 3).';e1.className='fe on';ok=false;}
  if(pass.length<6){e2.textContent='Mot de passe trop court (min. 6).';e2.className='fe on';ok=false;}
  if(pass!==pass2){e3.textContent='Les mots de passe ne correspondent pas.';e3.className='fe on';ok=false;}
  if(!ok) return;
  var keys=Object.keys(USERS);
  for(var i=0;i<keys.length;i++){if(USERS[keys[i]].pseudo.toLowerCase()===pseudo.toLowerCase()){e1.textContent='Ce pseudo est déjà pris.';e1.className='fe on';return;}}
  var id=pseudo.toLowerCase().replace(/[^a-z0-9]/g,'')+'_'+Date.now().toString(36);
  var hash=await sha256(pass);
  USERS[id]={id:id,pseudo:pseudo,password:hash,avatar:AVATARS[Math.floor(Math.random()*5)],role:'user',elo:1200,games:0,wins:0,losses:0,draws:0,joined:new Date().toLocaleDateString('fr-FR')};
  await saveUsers();
  ME=USERS[id];
  LS.set('sess',{id:id,ts:Date.now()});
  toast('Bienvenue '+pseudo+' ! 🎉','var(--grn)');
  enterHome();
}

function doLogout(){LS.del('sess');ME=null;show('sLogin');switchTab('login');}

  el.innerHTML='<div><div class="ptitle">Nouvelle partie</div><div class="psub">Choisissez votre mode</div></div>';
  var p=mk('div','panel');
  // Local
  var cl=mk('div');cl.style.cssText='background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:15px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:13px;transition:all .2s';
  cl.innerHTML='<div style="font-size:1.9rem">🤝</div><div><div style="font-weight:700">1v1 Local</div><div style="font-size:.76rem;color:var(--mut)">Deux joueurs, un écran</div></div><div style="margin-left:auto;color:var(--mut)">›</div>';
  cl.onmouseenter=function(){cl.style.borderColor='var(--gold)';};cl.onmouseleave=function(){cl.style.borderColor='var(--bdr)';};cl.onclick=startLocal;p.appendChild(cl);
  // Online
  var co=mk('div');co.style.cssText='background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:15px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:13px;transition:all .2s';
  co.innerHTML='<div style="font-size:1.9rem">🌐</div><div><div style="font-weight:700">En ligne</div><div style="font-size:.76rem;color:var(--mut)">P2P WebRTC (GitHub Pages HTTPS)</div></div><div style="margin-left:auto;color:var(--mut)">›</div>';
  co.onmouseenter=function(){co.style.borderColor='var(--gold)';};co.onmouseleave=function(){co.style.borderColor='var(--bdr)';};co.onclick=function(){gotoPage('online');};p.appendChild(co);
  // AI
  var ca=mk('div');ca.style.cssText='background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:15px';
  var lr=mk('div');lr.style.cssText='display:flex;gap:5px;margin:10px 0';
  [['easy','😊 Facile'],['medium','🧠 Moyen'],['hard','😈 Difficile'],['master','💀 Maître']].forEach(function(lv){

async function testAndSaveGH(){
  var owner=document.getElementById('gOwner').value.trim();
  var repo=document.getElementById('gRepo').value.trim();
  var token=document.getElementById('gToken').value.trim();
  var errEl=document.getElementById('ghErr');errEl.className='fe';
  if(!owner||!repo||!token){errEl.textContent='Tous les champs sont requis.';errEl.className='fe on';return;}
  var btn=document.querySelector('[onclick="testAndSaveGH()"]');
  btn.disabled=true;btn.textContent='Test en cours...';
  // Save config temporarily
  GH.owner=owner;GH.repo=repo;GH.token=token;GH.ok=true;
  try{
    // Test de lecture
    var data=await ghRead('users.json');
    // Si OK, sauvegarder
    LS.set('ghcfg',{owner:owner,repo:repo,token:token,branch:'main'});
    // Merger les données
    USERS=data;
    GAMES=await ghRead('games.json');
    LS.set('users',USERS);LS.set('games',GAMES);
    toast('✅ GitHub connecté et données synchronisées !','var(--grn)');
    gotoPage('admin');
  }catch(e){
    GH.ok=false;
    errEl.textContent='Erreur : '+e.message+'. Vérifiez owner, repo et token.';
    errEl.className='fe on';
  }
  btn.disabled=false;btn.textContent='✓ Tester et sauvegarder';
}

async function syncNow(){
  if(!GH.ok){toast('GitHub non configuré','var(--red)');return;}
  try{
    var u=await ghRead('users.json');var g=await ghRead('games.json');
    USERS=u;GAMES=g;LS.set('users',USERS);LS.set('games',GAMES);

function ib(){var o=['R','N','B','Q','K','B','N','R'],b=Array.from({length:8},function(){return Array(8).fill(null);});for(var c=0;c<8;c++){b[0][c]='b'+o[c];b[1][c]='bP';b[6][c]='wP';b[7][c]='w'+o[c];}return b;}

  var p=brd[r][c];if(!p)return[[],[]];

  if(t==='P'){var d=col==='w'?-1:1,nr=r+d;if(nr>=0&&nr<8){if(!brd[nr][c]){mv.push([nr,c]);var s=col==='w'?6:1,nr2=r+2*d;if(r===s&&nr2>=0&&nr2<8&&!brd[nr2][c])mv.push([nr2,c]);}for(var dc=-1;dc<=1;dc+=2){var nc2=c+dc;if(nc2>=0&&nc2<8&&brd[nr][nc2]&&brd[nr][nc2][0]!==col)cp.push([nr,nc2]);}}}

function inChk(col,brd){var kr=-1,kc=-1;for(var r=0;r<8;r++)for(var c=0;c<8;c++)if(brd[r][c]===col+'K'){kr=r;kc=c;}if(kr<0)return true;var opp=col==='w'?'b':'w';for(var r2=0;r2<8;r2++)for(var c2=0;c2<8;c2++){if(brd[r2][c2]&&brd[r2][c2][0]===opp){var res=rawMoves(r2,c2,brd);if(res[1].some(function(p){return p[0]===kr&&p[1]===kc;}))return true;}}return false;}

/* ONLINE */
var myPeer=null,pConn=null,myCode='',mmRun=false;
function initPeer(){if(myPeer&&!myPeer.destroyed){updateCode();return;}myCode=genCode();updateCode();setCd('c','connecting','Initialisation...');myPeer=new Peer('cp-'+myCode,{debug:0});myPeer.on('open',function(){setCd('c','connecting','En attente d\'un adversaire...');});myPeer.on('connection',function(conn){pConn=conn;setupConn(conn,'host');});myPeer.on('error',function(e){setCd('c','error','Erreur: '+e.message);if(e.type==='unavailable-id'){myCode=genCode();updateCode();myPeer=new Peer('cp-'+myCode);}});}
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}
function updateCode(){var el=document.getElementById('myCode');if(el)el.textContent=myCode;}
function copyCode(){navigator.clipboard.writeText(myCode).then(function(){toast('Code copié 📋');});}
function setCd(type,state,msg){var di=type==='c'?'cdC':'cdJ',ti=type==='c'?'cdCTxt':'cdJTxt';var d=document.getElementById(di),t=document.getElementById(ti);if(d)d.className='cd '+state;if(t)t.textContent=msg;}
function joinOnline(){var code=(document.getElementById('joinIn').value||'').trim().toUpperCase();if(!code||code.length<4){toast('Code invalide','var(--red)');return;}var bar=document.getElementById('joinBar');if(bar)bar.style.display='flex';setCd('j','connecting','Connexion...');if(!myPeer||myPeer.destroyed)myPeer=new Peer();myPeer.on('open',function(){var conn=myPeer.connect('cp-'+code);pConn=conn;setupConn(conn,'guest');});myPeer.on('error',function(e){setCd('j','error','Introuvable: '+e.message);});}
function setupConn(conn,role){conn.on('open',function(){setCd('c','connected','Adversaire connecté !');setCd('j','connected','Connecté !');toast('Adversaire connecté ! 🎮','var(--grn)');resetG();G.mode='online';G.conn=conn;G.myColor=role==='host'?'w':'b';conn.send({type:'start',name:ME.pseudo});launchGame();});conn.on('data',function(data){if(data.type==='move')execMv(data.fr,data.fc,data.tr,data.tc,true);else if(data.type==='chat')addChat(data.from,data.msg,false);else if(data.type==='resign')endGame('resign',G.myColor);else if(data.type==='draw'){if(confirm('Nulle proposée. Accepter ?')){conn.send({type:'draw-accept'});endGame('draw',null);}}else if(data.type==='draw-accept')endGame('draw',null);});conn.on('close',function(){toast('Adversaire déconnecté','var(--red)');if(!G.gameOver)endGame('resign',G.myColor);});}
function switchOTab(tab){document.querySelectorAll('.otab').forEach(function(b,i){b.classList.toggle('on',['create','join','match'][i]===tab);});document.querySelectorAll('.opane').forEach(function(p){p.classList.remove('on');});var pane=document.getElementById('op-'+tab);if(pane)pane.classList.add('on');}
function startMM(){mmRun=true;document.getElementById('mmIdle').style.display='none';document.getElementById('mmActive').style.display='block';var bucket=Math.floor(Date.now()/(1000*120));var pool='MM'+bucket.toString(36).toUpperCase().slice(-4);if(myPeer&&!myPeer.destroyed)myPeer.destroy();myPeer=new Peer();myPeer.on('open',function(){var conn=myPeer.connect('cp-'+pool);var ok=false;conn.on('open',function(){ok=true;pConn=conn;setupConn(conn,'guest');resetMM();});conn.on('error',function(){});setTimeout(function(){if(!ok&&mmRun){myPeer.destroy();myPeer=new Peer('cp-'+pool);myPeer.on('open',function(){toast('En attente...');});myPeer.on('connection',function(c){pConn=c;setupConn(c,'host');resetMM();});myPeer.on('error',function(){cancelMM();});}},2500);});myPeer.on('error',function(){cancelMM();});}
function cancelMM(){mmRun=false;if(myPeer&&!myPeer.destroyed)myPeer.destroy();resetMM();}
function resetMM(){mmRun=false;var i=document.getElementById('mmIdle'),a=document.getElementById('mmActive');if(i)i.style.display='block';if(a)a.style.display='none';}

/* REPLAY */
var RP={snaps:[],moves:[],idx:0};
function startReplay(game){RP.snaps=game.boardSnapshots||[];RP.moves=game.moves||[];RP.idx=0;buildRpCoords();buildRpMvs();rpRender();show('sReplay');}
function buildRpCoords(){var rc=document.getElementById('rpRcol'),fc=document.getElementById('rpFrow');if(!rc||!fc)return;rc.innerHTML=fc.innerHTML='';for(var r=0;r<8;r++){var s=mk('span');s.textContent=8-r;rc.appendChild(s);}for(var c=0;c<8;c++){var s2=mk('span');s2.textContent=FILES[c];fc.appendChild(s2);}}
function buildRpMvs(){var el=document.getElementById('rpMvList');el.innerHTML='';RP.moves.forEach(function(mv,i){if(i%2===0){var row=mk('div','mrow');var num=mk('span','mnum');num.textContent=Math.floor(i/2)+1+'.';row.appendChild(num);var b1=mk('button','mbtn');b1.textContent=mv;b1.onclick=(function(idx){return function(){RP.idx=idx;rpRender();};})(i+1);row.appendChild(b1);if(RP.moves[i+1]){var b2=mk('button','mbtn');b2.textContent=RP.moves[i+1];b2.onclick=(function(idx){return function(){RP.idx=idx;rpRender();};})(i+2);row.appendChild(b2);}el.appendChild(row);}});}
function rpRender(){var el=document.getElementById('rpboard');if(!el)return;el.innerHTML='';var brd=RP.idx===0?ib():(RP.snaps[RP.idx-1]||ib());for(var r=0;r<8;r++)for(var c=0;c<8;c++){var sq=mk('div');sq.style.cssText='width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:'+((r+c)%2===0?'var(--sql)':'var(--sqd)')+';';var p=brd[r][c];if(p){var sp=mk('span');sp.style.cssText='font-size:1.7rem;line-height:1;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.43));';sp.textContent=SYM[p]||'';sq.appendChild(sp);}el.appendChild(sq);}document.getElementById('rpCtr').textContent=RP.idx+'/'+RP.snaps.length;document.querySelectorAll('#rpMvList .mbtn').forEach(function(b,i){b.classList.toggle('cur',i===RP.idx-1);});var cur=document.querySelector('#rpMvList .mbtn.cur');if(cur)cur.scrollIntoView({block:'nearest'});}
function rpStep(d){RP.idx=Math.max(0,Math.min(RP.snaps.length,RP.idx+d));rpRender();}
function rpGo(v){RP.idx=v<0?RP.snaps.length:v;rpRender();}

/* UTILS */
function mk(tag,cls){var el=document.createElement(tag||'div');if(cls)el.className=cls;return el;}
function toast(msg,color){var el=mk('div','toast');if(color)el.style.color=color;el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';},2300);setTimeout(function(){el.remove();},2600);}

/* BG ANIMATION */
(function(){var canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d'),w,h,ps=[];var syms=['♟','♞','♝','♜','♛','♚'];function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}function init(){ps=Array.from({length:12},function(){return{x:Math.random()*w,y:Math.random()*h,sym:syms[Math.floor(Math.random()*6)],sz:15+Math.random()*23,sp:.17+Math.random()*.33,op:.02+Math.random()*.05,dx:(Math.random()-.5)*.2};});}function draw(){ctx.clearRect(0,0,w,h);ps.forEach(function(p){ctx.font=p.sz+'px serif';ctx.fillStyle='rgba(201,168,76,'+p.op+')';ctx.fillText(p.sym,p.x,p.y);p.y-=p.sp;p.x+=p.dx;if(p.y<-40){p.y=h+40;p.x=Math.random()*w;}});requestAnimationFrame(draw);}resize();init();draw();window.addEventListener('resize',function(){resize();init();});})();

/* KEYBOARD */
document.getElementById('lPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('lPseudo').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('rPass2').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

/* BOOT */
(async function boot(){
  applyTheme();
  // Charger config GitHub si existante
  ghLoad();
  // Init data (localStorage + GitHub si disponible)
  await dataInit();
  // Auto-login
  var sess=LS.get('sess',null);
  if(sess&&sess.id&&Date.now()-sess.ts<7*86400000){
    var u=USERS[sess.id];
    if(u){ME=u;enterHome();return;}
  }
  // Afficher le login
  show('sLogin');
})();
</script>
